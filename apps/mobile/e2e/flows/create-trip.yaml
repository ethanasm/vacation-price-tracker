# Create-trip flow — Maestro
#
# End-to-end create path: sign-in, open the create-trip form, fill required
# fields, submit, verify the backend round-trip. The create call hits the e2e
# backend (infra/docker-compose.e2e.yml) which the emulator reaches at
# EXPO_PUBLIC_API_URL=http://10.0.2.2:8010 — the emulator NAT alias for the
# runner host's loopback.
#
# The created trip ("Maestro Test Trip") persists in the e2e database across
# flows/runs and is the `trip-card` target for trips-list / trip-detail. The
# create contract has NO saved-confirmation testID — the proof is the new name
# appearing back in `trips-list` after navigating to Trips. If that final
# assertion fails while the form steps pass, suspect the backend: stack down,
# P5 Bearer-header support not merged, or allowlist drift in .env.e2e.
appId: me.ethanasm.vacation_price_tracker
name: create-trip
tags:
  - critical
  - write
---
- launchApp:
    clearState: true
    clearKeychain: true

- scrollUntilVisible:
    element:
      id: "sign-in-google-button"
    direction: DOWN
    visibilityPercentage: 60
    waitToSettleTimeoutMs: 500
    timeout: 30000
- tapOn:
    id: "sign-in-google-button"

- assertVisible:
    text: "Trips"

# Open the create-trip form via the FAB.
- tapOn:
    id: "new-trip-fab"

- assertVisible:
    id: "create-trip-name-input"

- tapOn:
    id: "create-trip-name-input"
- inputText: "Maestro Test Trip"

# From/To are typeahead fields: typing ≥2 chars opens a suggestion list and
# each row is `<input testID>-option-<CODE>`. Picking the exact-code row both
# fills the field and exercises the autocomplete path.
- tapOn:
    id: "create-trip-origin-input"
- inputText: "SEA"
- tapOn:
    id: "create-trip-origin-input-option-SEA"

- tapOn:
    id: "create-trip-destination-input"
- inputText: "OGG"
- tapOn:
    id: "create-trip-destination-input-option-OGG"

# Dates come from a bounded calendar sheet (no keyboard input). The form
# defaults to a valid round trip (tomorrow → +8 days); re-pick the departure
# as the 15th of NEXT month so the flow exercises the picker deterministically
# on any run date (always within the today…today+359 window). Moving the
# departure past the default return clears the return, so pick the 20th of the
# same month right after — the return calendar opens on the departure month.
- tapOn:
    id: "create-trip-depart-input"
- tapOn:
    id: "create-trip-depart-input-next-month"
- tapOn:
    id: "create-trip-depart-input-day-15"

- tapOn:
    id: "create-trip-return-input"
- tapOn:
    id: "create-trip-return-input-day-20"

# Hotel city is REQUIRED by the API when track_hotels is on (it 422s otherwise:
# "hotel_prefs.city is required") — mirrors the web create form. The field sits
# in the Hotel preferences card below the fold, so scroll it into view first.
- scrollUntilVisible:
    element:
      id: "create-trip-hotel-city-input"
    direction: DOWN
    visibilityPercentage: 80
    timeout: 20000
- tapOn:
    id: "create-trip-hotel-city-input"
- inputText: "Maui"

# Dismiss the IME before submitting so Gboard's content-description elements
# don't compete with the submit control.
- hideKeyboard

# The submit button lives at the bottom of the form's scroll view, beneath the
# flight/hotel preference + threshold cards — scroll it into view before tapping.
- scrollUntilVisible:
    element:
      id: "create-trip-submit"
    direction: DOWN
    visibilityPercentage: 80
    timeout: 20000
- tapOn:
    id: "create-trip-submit"

# Create contract: no saved-confirmation card. A successful create commits to
# the e2e backend and replaces into the new trip's detail screen, which fetches
# the trip back and renders its stat blocks + name — proof the create round-trip
# persisted. The form stays put on a validation/API error, so a detail-only stat
# block is the unambiguous success signal. trips-list.yaml / trip-detail.yaml
# separately verify the row from fresh launches reading the server-fed list.
- assertVisible:
    id: "trip-detail-total-stat"
- assertVisible:
    text: "Maestro Test Trip"
