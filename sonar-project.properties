sonar.organization=ethanasm
sonar.projectKey=ethanasm_vacation-price-tracker
sonar.projectName=vacation-price-tracker

sonar.sources=apps/web/src,apps/api/app,apps/worker/worker
sonar.tests=apps/web/src/__tests__,apps/api/tests,apps/worker/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/test_*.py,**/*_test.py

# Exclude data and generated files from duplication analysis.
# types.ts is emitted by openapi-typescript and has inherent repetition
# (every operation re-declares the same wrapper shape) that we can't act on.
sonar.cpd.exclusions=\
  **/data/airports.ts,\
  apps/web/src/lib/api/types.ts,\
  apps/web/src/lib/api/openapi.json

# Exclude from coverage analysis. These MUST stay in sync with what the coverage
# *tools* measure — coverage.py's `omit` (pyproject.toml) for Python and jest's
# `collectCoverageFrom` negations (apps/web/jest.config.ts) for web. Any source
# file Sonar scans that is absent from the coverage report gets zero-coverage'd
# to 0%, silently dragging down "Coverage on New Code". `scripts/sonar-coverage-
# check.mjs` enforces this alignment locally.
sonar.coverage.exclusions=\
  **/__init__.py,\
  **/worker/__main__.py,\
  apps/api/app/models/**,\
  apps/web/src/components/ui/**,\
  apps/web/src/data/**,\
  apps/web/src/app/**/layout.tsx,\
  apps/web/src/lib/navigation.ts,\
  apps/web/src/lib/mock-data.ts,\
  apps/web/src/lib/fixtures/**,\
  apps/web/src/context/ThemeContext.tsx,\
  **/index.ts,\
  **/index.tsx,\
  **/*.d.ts

# Coverage reports
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.python.coverage.reportPaths=apps/api/coverage.xml,apps/worker/coverage.xml
