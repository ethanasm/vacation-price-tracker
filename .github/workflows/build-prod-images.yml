name: Build Prod Images

# Build & push the production container images on every merge to main, tagged
# both :latest and :<full-sha>. deploy.yml pins IMAGE_TAG to the SHA so a deploy
# always lands the exact images built for that commit.
on:
  push:
    branches: [main]

# Don't cancel an in-flight image build — a half-pushed image set is worse than
# a slightly delayed one.
concurrency:
  group: build-prod-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Contexts mirror docker-compose.yml: web builds from apps/web,
          # api/worker build from the repo root (they COPY root pyproject/uv.lock).
          - app: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
            # NEXT_PUBLIC_* must be baked at build time (inlined into the client
            # bundle); a runtime env var can't reach the browser.
            build_args: NEXT_PUBLIC_API_URL=https://vacation-price-tracker.ethanasm.me
          - app: api
            context: .
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - app: worker
            context: .
            dockerfile: apps/worker/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ethanasm/vpt-${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: production
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
