name: Web

on:
  # Union path filter shared with server.yml so ANY code change runs BOTH
  # coverage workflows. SonarCloud downloads web + python coverage by commit
  # SHA; if only one workflow ran, the other language's report is missing and
  # Sonar zero-coverages it (tanking Coverage on New Code). Both-or-neither.
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/worker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "alembic.ini"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nx.json"
      - "tsconfig*.json"
      - "sonar-project.properties"
      - ".github/workflows/web.yml"
      - ".github/workflows/server.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/worker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "alembic.ini"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nx.json"
      - "tsconfig*.json"
      - "sonar-project.properties"
      - ".github/workflows/web.yml"
      - ".github/workflows/server.yml"
concurrency:
  group: nextjs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # Drop github.sha from the key so it isn't busted every commit; rely on
      # restore-keys to warm from the most recent cache.
      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-web-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nx-web-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Scope to the web project only — this workflow provisions Node, not the
      # Python toolchain, so it must not run api/worker targets (which call uv).
      # The workflow-level paths filter is what skips this job on non-web PRs.
      # test:coverage runs here too, so the lcov report is always produced for
      # the SonarQube workflow to consume.
      - name: Build / lint / typecheck / test (web)
        run: pnpm nx run-many -t build lint typecheck test:coverage --projects=web

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `--ignore-registry-errors` exits 0 when the audit endpoint itself errors.
      # The legacy npm audit endpoint pnpm uses returns 410 since npm retired it
      # in favour of the bulk advisory endpoint; until pnpm migrates we tolerate
      # registry errors so CI is not permanently red.
      - name: Run pnpm audit
        working-directory: apps/web
        run: pnpm audit --audit-level=moderate --ignore-registry-errors
        continue-on-error: true

      - name: Run pnpm audit (production only)
        working-directory: apps/web
        run: pnpm audit --prod --ignore-registry-errors
