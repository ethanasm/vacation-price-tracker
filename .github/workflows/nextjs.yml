name: Next.js

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nx.json"
      - "tsconfig*.json"
      - ".github/workflows/nextjs.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nx.json"
      - "tsconfig*.json"
      - ".github/workflows/nextjs.yml"

# Cancel superseded runs on a PR; let main builds finish.
concurrency:
  group: nextjs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for nx affected

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # Drop github.sha from the key so it isn't busted every commit; rely on
      # restore-keys to warm from the most recent cache.
      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-web-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nx-web-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set NX_BASE for affected commands
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> $GITHUB_ENV
          else
            echo "NX_BASE=HEAD~1" >> $GITHUB_ENV
          fi

      - name: Build / lint / typecheck (affected)
        run: pnpm nx affected -t build lint typecheck --base=${{ env.NX_BASE }}

      # Run coverage directly (single web project, path-gated workflow) so the
      # lcov report is always produced for the SonarQube workflow to consume.
      - name: Test web with coverage
        run: pnpm nx run web:test:coverage

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/lcov.info
          if-no-files-found: error
          retention-days: 1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `--ignore-registry-errors` exits 0 when the audit endpoint itself errors.
      # The legacy npm audit endpoint pnpm uses returns 410 since npm retired it
      # in favour of the bulk advisory endpoint; until pnpm migrates we tolerate
      # registry errors so CI is not permanently red.
      - name: Run pnpm audit
        working-directory: apps/web
        run: pnpm audit --audit-level=moderate --ignore-registry-errors
        continue-on-error: true

      - name: Run pnpm audit (production only)
        working-directory: apps/web
        run: pnpm audit --prod --ignore-registry-errors
