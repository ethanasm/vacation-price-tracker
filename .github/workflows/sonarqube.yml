name: SonarQube

# Coverage is computed once by the Web and Server workflows, which upload
# lcov.info / coverage.xml as artifacts. This workflow no longer re-runs any
# tests — it waits for those workflows, downloads their coverage, and runs only
# the scan. Triggering on both means it re-scans when the slower one finishes;
# the concurrency group cancels the earlier, less-complete scan.
on:
  workflow_run:
    workflows: ["Web", "Server"]
    types: [completed]

concurrency:
  group: sonar-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones disabled for better analysis
          ref: ${{ github.event.workflow_run.head_sha }}

      # Coverage artifacts may come from a different workflow run for the same
      # commit, so fetch by commit SHA. `warn` (not fail) handles the case where
      # one language's workflow was path-filtered out for this change.
      - name: Download web coverage
        uses: dawidd6/action-download-artifact@v6
        with:
          name: web-coverage
          workflow: web.yml
          commit: ${{ github.event.workflow_run.head_sha }}
          path: apps/web/coverage
          if_no_artifact_found: warn

      - name: Download Python coverage
        uses: dawidd6/action-download-artifact@v6
        with:
          name: python-coverage
          workflow: server.yml
          commit: ${{ github.event.workflow_run.head_sha }}
          path: apps
          if_no_artifact_found: warn

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
