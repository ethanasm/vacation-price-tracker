name: Server

on:
  # Union path filter shared with web.yml and sonarqube.yml so ANY code
  # change runs BOTH coverage workflows plus the Sonar scan. The scan waits
  # for both runs and downloads their coverage by commit SHA; if only one
  # workflow ran, the other language's report is missing and Sonar
  # zero-coverages it (tanking Coverage on New Code). All-or-neither.
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/worker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "alembic.ini"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nx.json"
      - "tsconfig*.json"
      - "sonar-project.properties"
      - ".github/workflows/web.yml"
      - ".github/workflows/server.yml"
      - ".github/workflows/sonarqube.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "apps/worker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "alembic.ini"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nx.json"
      - "tsconfig*.json"
      - "sonar-project.properties"
      - ".github/workflows/web.yml"
      - ".github/workflows/server.yml"
      - ".github/workflows/sonarqube.yml"
concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      DATABASE_URL: sqlite+aiosqlite:///tmp/test_vacation_tracker.db
      GROQ_API_KEY: test-groq-key
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.1

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # setup-uv replaces `pip install uv` + uncached `uv sync`; it caches the
      # uv download and the resolved environment keyed on uv.lock.
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Cache Nx
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-python-${{ hashFiles('uv.lock', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nx-python-
            ${{ runner.os }}-nx-

      - name: Install Node dependencies (for Nx)
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --extra dev

      # Scope to the Python projects only — this workflow provisions the Python
      # toolchain; the workflow-level paths filter skips it on non-Python PRs.
      - name: Lint (api + worker)
        run: pnpm nx run-many -t lint --projects=api,worker

      # Run coverage directly for both apps so coverage.xml is always produced
      # for the SonarQube workflow.
      - name: Test API
        run: pnpm nx run api:test:coverage

      - name: Test Worker
        run: pnpm nx run worker:test:coverage

      - name: Integration Tests (Temporal dev server)
        run: pnpm nx run worker:test:integration

      - name: Upload Python coverage
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: |
            apps/api/coverage.xml
            apps/worker/coverage.xml
          if-no-files-found: error
          retention-days: 1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pip-audit
        run: uv run pip-audit
