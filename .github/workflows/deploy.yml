name: Deploy

# Roll the self-hosted prod host forward to a commit whose images are already in
# GHCR. Runs after Build Prod Images succeeds on main, or on demand for a SHA.
on:
  workflow_run:
    workflows: ["Build Prod Images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (must have images in GHCR)"
        required: true

# One deploy at a time; never cancel an in-progress rollout.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    # Auto-deploy only for successful main builds; manual dispatch is always allowed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: [self-hosted, vpt-prod]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Resolve target SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "sha=${{ github.event.inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify prod tree
        # Operator-managed state only: a git checkout holding the gitignored
        # .env.prod. The compose file itself is tracked and produced by the reset.
        run: |
          set -euo pipefail
          test -d /opt/vacation-price-tracker/.git      || { echo "prod tree is not a git checkout"; exit 1; }
          test -f /opt/vacation-price-tracker/.env.prod || { echo ".env.prod missing in /opt/vacation-price-tracker"; exit 1; }

      - name: Fetch and reset to target SHA
        working-directory: /opt/vacation-price-tracker
        run: |
          set -euo pipefail
          git fetch --all --prune
          git reset --hard "${{ steps.sha.outputs.sha }}"
          # Drop stray tracked-adjacent files but keep gitignored state (.env.prod).
          git clean -fd

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull images and bring stack up
        working-directory: /opt/vacation-price-tracker
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.sha }}
        run: |
          pnpm prod:pull
          pnpm prod:up

      - name: Pre-migration DB backup
        working-directory: /opt/vacation-price-tracker
        # Snapshot the DB before migrations so a bad migration has a recovery
        # point. Writes backups/pre-migrate-<sha>.dump. A backup we can't take
        # is exactly when we least want to migrate, so this is fatal.
        env:
          DEPLOY_SHA: ${{ steps.sha.outputs.sha }}
        run: pnpm prod:db:backup

      - name: Run database migrations
        working-directory: /opt/vacation-price-tracker
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.sha }}
        run: pnpm prod:db:migrate

      - name: Post-deploy health gate
        working-directory: /opt/vacation-price-tracker
        # Block "deploy succeeded" until the api reports ready (DB + Redis +
        # Temporal all reachable). /ready returns 503 until they are; the curl
        # retries cover the boot/migration window.
        run: pnpm prod:health:ready

      - name: Prune old images
        # Each deploy pulls fresh :<sha> images; they're tagged, so a plain
        # dangling prune never reclaims them and the host disk grows deploy over
        # deploy. Also sweep tagged-but-unused images older than 30 days.
        run: |
          docker image prune -f
          docker image prune -af --filter "until=720h"
